<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceBridge — Bangla ↔ English Translator</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Sora (display) + Plus Jakarta Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- ░░ BACKGROUND ORBS ░░ -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- ░░ TOAST NOTIFICATION ░░ -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ░░ MAIN WRAPPER ░░ -->
  <div class="app-wrapper">

    <!-- ── HEADER ── -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🌐</span>
        <span class="logo-text">VoiceBridge</span>
      </div>
      <div class="header-actions">
        <!-- Dark / Light toggle -->
        <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark/light mode">
          <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <!-- History toggle -->
        <button id="historyToggle" class="icon-btn" title="Translation history" aria-label="View translation history">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h18v4H3zM3 11h18v4H3zM3 19h18v4H3z" style="display:none"/>
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── LANGUAGE BAR ── -->
    <section class="lang-bar glass-card" aria-label="Language selection">
      <div class="lang-select-group">
        <label for="sourceLang" class="lang-label">Speaking in</label>
        <select id="sourceLang" class="lang-select" aria-label="Source language">
          <option value="bn-BD">🇧🇩 বাংলা</option>
          <option value="en-US" selected>🇺🇸 English</option>
        </select>
      </div>

      <!-- Swap button -->
      <button id="swapLangs" class="swap-btn" title="Swap languages" aria-label="Swap source and target language">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>

      <div class="lang-select-group">
        <label for="targetLang" class="lang-label">Translate to</label>
        <select id="targetLang" class="lang-select" aria-label="Target language">
          <option value="bn">🇧🇩 বাংলা</option>
          <option value="en" selected>🇺🇸 English</option>
        </select>
      </div>
    </section>

    <!-- ── MIC SECTION ── -->
    <section class="mic-section" aria-label="Microphone control">
      <!-- Waveform visualizer -->
      <div class="waveform" id="waveform" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- Mic button -->
      <button id="micBtn" class="mic-btn" aria-label="Start listening" aria-pressed="false">
        <div class="mic-ring mic-ring-1"></div>
        <div class="mic-ring mic-ring-2"></div>
        <div class="mic-inner">
          <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
      </button>

      <p id="micStatus" class="mic-status">Click to start listening</p>

      <!-- Signal strength dots -->
      <div id="signalDots" class="signal-dots" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </section>

    <!-- ── TEXT PANELS ── -->
    <div class="panels-grid">

      <!-- Original Speech Panel -->
      <div class="panel glass-card">
        <div class="panel-header">
          <span class="panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Original Speech
          </span>
          <span id="sourceCount" class="char-count">0 / 1000</span>
        </div>
        <!-- Interim speech preview (live as you speak) -->
        <div id="interimBox" class="interim-box" aria-live="polite" aria-label="Live speech preview"></div>

        <textarea
          id="sourceText"
          class="text-area"
          placeholder="Your speech will appear here… or type directly."
          maxlength="1000"
          aria-label="Original speech text"
          spellcheck="false"
        ></textarea>
        <div class="panel-actions">
          <button class="action-btn" id="clearSource" title="Clear text" aria-label="Clear source text">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Clear
          </button>
          <button class="action-btn" id="speakSource" title="Read aloud" aria-label="Speak source text">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Listen
          </button>
          <button class="action-btn primary" id="translateBtn" aria-label="Translate text">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
            Translate
          </button>
        </div>
      </div>

      <!-- Translated Output Panel -->
      <div class="panel glass-card">
        <div class="panel-header">
          <span class="panel-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Translation
          </span>
          <span id="targetCount" class="char-count">0 chars</span>
        </div>

        <!-- Loading overlay -->
        <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-hidden="true">
          <div class="spinner"></div>
          <span>Translating…</span>
        </div>

        <textarea
          id="translatedText"
          class="text-area"
          placeholder="Translation will appear here…"
          readonly
          aria-label="Translated text output"
          spellcheck="false"
        ></textarea>
        <div class="panel-actions">
          <button class="action-btn" id="clearTarget" title="Clear translation" aria-label="Clear translated text">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Clear
          </button>
          <button class="action-btn" id="speakTarget" title="Read aloud" aria-label="Speak translated text">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Listen
          </button>
          <button class="action-btn" id="copyBtn" title="Copy translation" aria-label="Copy translated text">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="action-btn primary" id="downloadBtn" title="Download as .txt" aria-label="Download translation as text file">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
        </div>
      </div>

    </div><!-- /panels-grid -->

    <!-- ── HISTORY PANEL ── -->
    <aside id="historyPanel" class="history-panel glass-card" aria-label="Translation history" hidden>
      <div class="history-header">
        <h2 class="history-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Recent Translations
        </h2>
        <button id="clearHistory" class="action-btn" aria-label="Clear history">Clear all</button>
      </div>
      <ul id="historyList" class="history-list" aria-label="Translation history list">
        <!-- JS populated -->
      </ul>
      <p id="historyEmpty" class="history-empty">No translations yet. Start speaking!</p>
    </aside>

    <!-- ── FOOTER ── -->
    <footer class="app-footer">
      <p>VoiceBridge · Powered by Web Speech API &amp; Google Translate · Chrome recommended</p>
    </footer>

  </div><!-- /app-wrapper -->

  <script src="script.js"></script>
</body>
</html>
